## Plugins
## tpm: https://github.com/tmux-plugins/tpm
## tmux-sensible: https://github.com/tmux-plugins/tmux-sensible
## tmux-yank: https://github.com/tmux-plugins/tmux-yank
## tmux-resurrect: https://github.com/tmux-plugins/tmux-resurrect
## tmux-continuum: https://github.com/tmux-plugins/tmux-continuum
## tmux-open: https://github.com/tmux-plugins/tmux-open
## catppuccin/tmux: https://github.com/catppuccin/tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'

## Options

# Mouse Support
set -g mouse on

# Set vi-mode
set-window-option -g mode-keys vi

# Start window and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Restore Tmux
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-hook-post-save-layout '~/.config/tmux/scripts/validate-resurrect-save.sh'
set -g @continuum-restore 'on'

# Catppuccin Theme Options
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_flags "icon"
set -g window-status-separator ""
set -g @catppuccin_date_time_text " %m/%d %H:%M"
set -g @catppuccin_cpu_icon "󰍛 "

## Key Mapping

# Set Prefix
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Shift Alt vim keys(Opt key in my mac) to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Open panes in current directory
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Reload source file
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded config file."

# hjkl pane traversal, like VIM
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resizsing pane
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Copy mode vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancle

# ClaudeCode
set -g extended-keys always
set -ga terminal-features "*:extkeys"

## Run Shell

# Load catppuccin before status bar config (v2 requires this order)
run ~/.config/tmux/plugins/tmux/catppuccin.tmux
# RAM module (custom - outside plugin to survive tpm update)
source -F ~/.config/tmux/status/ram.conf

# Status bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -gF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

