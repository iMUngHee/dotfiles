<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Context</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --sf1: #18181b;
      --sf2: #27272a;
      --sf3: #3f3f46;
      --bd: #27272a;
      --bd2: #3f3f46;
      --tx: #fafafa;
      --tx2: #a1a1aa;
      --tx3: #71717a;
      --ac: #8b5cf6;
      --ac2: #a78bfa;
      --ac-bg: rgba(139,92,246,.12);
      --dn: #ef4444;
      --dn2: #f87171;
      --dn-bg: rgba(239,68,68,.1);
      --r: 10px;
      --rs: 6px;
      --tr: 150ms ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--tx);
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sf3); border-radius: 3px; }

    .app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sf1);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
    }

    .sidebar-hd {
      padding: 24px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-hd h1 {
      font-size: 11px;
      font-weight: 700;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .task-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }

    .task-item {
      padding: 10px 14px;
      border-radius: var(--rs);
      cursor: pointer;
      transition: all var(--tr);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
      border: 1px solid transparent;
    }

    .task-item:hover { background: var(--sf2); }

    .task-item.active {
      background: var(--ac-bg);
      border-color: rgba(139,92,246,.2);
    }

    .task-item.active .task-name { color: var(--ac2); }

    .task-name { font-size: 13px; font-weight: 500; }

    .badge {
      font-size: 11px;
      color: var(--tx3);
      background: var(--sf2);
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .task-item.active .badge {
      background: rgba(139,92,246,.18);
      color: var(--ac2);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-hd {
      padding: 24px 36px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--bd);
    }

    .main-hd h2 { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }

    .links-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 36px;
    }

    /* ── Link cards ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card {
      background: var(--sf1);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 14px 18px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color var(--tr);
      animation: cardIn 180ms ease;
    }

    .link-card:hover { border-color: var(--bd2); }

    .link-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .link-body { flex: 1; min-width: 0; }

    .link-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 3px;
    }

    .link-url {
      font-size: 13px;
      color: var(--tx2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url a { color: inherit; text-decoration: none; }
    .link-url a:hover { color: var(--tx); text-decoration: underline; }

    .btn-x {
      padding: 4px 7px;
      border: none;
      background: transparent;
      color: var(--tx3);
      cursor: pointer;
      border-radius: var(--rs);
      transition: all var(--tr);
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-x:hover { background: var(--dn-bg); color: var(--dn); }

    /* ── Add link bar ── */
    .add-bar {
      padding: 16px 36px;
      border-top: 1px solid var(--bd);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .fg { display: flex; flex-direction: column; gap: 4px; }

    .fg label {
      font-size: 11px;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
    }

    input[type="text"], input[type="url"] {
      padding: 9px 12px;
      border-radius: var(--rs);
      border: 1px solid var(--bd);
      background: var(--bg);
      color: var(--tx);
      font-size: 13px;
      outline: none;
      transition: border-color var(--tr);
    }

    input:focus { border-color: var(--ac); }
    input::placeholder { color: var(--tx3); }

    /* ── Buttons ── */
    .btn {
      padding: 9px 18px;
      border-radius: var(--rs);
      border: 1px solid var(--bd2);
      background: var(--sf2);
      color: var(--tx);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--tr);
      white-space: nowrap;
    }

    .btn:hover { background: var(--sf3); }

    .btn-ac {
      background: var(--ac);
      border-color: var(--ac);
      color: #fff;
    }

    .btn-ac:hover { background: var(--ac2); border-color: var(--ac2); }

    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .btn-dn {
      color: var(--dn);
      border-color: transparent;
      background: transparent;
    }

    .btn-dn:hover { background: var(--dn-bg); }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--tx3);
      gap: 6px;
    }

    .empty-icon { font-size: 32px; opacity: .4; margin-bottom: 4px; }
    .empty p { font-size: 13px; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--sf1);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      padding: 28px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .modal input {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 18px;
      border-radius: var(--rs);
      border: 1px solid var(--bd2);
      background: var(--bg);
      color: var(--tx);
      font-size: 14px;
      outline: none;
    }

    .modal input:focus { border-color: var(--ac); }

    .modal-ft {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-hd">
        <h1>Tasks</h1>
        <button class="btn btn-ac btn-sm" onclick="showModal()">+ New</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </aside>
    <main class="main">
      <div id="emptyMain" class="empty">
        <div class="empty-icon">&mdash;</div>
        <p>Select a task or create a new one</p>
      </div>
      <div id="detail" class="hidden">
        <div class="main-hd">
          <h2 id="taskTitle"></h2>
          <button class="btn btn-dn btn-sm" onclick="delTask()">Delete Task</button>
        </div>
        <div class="links-wrap" id="linksWrap"></div>
        <div class="add-bar">
          <div class="fg" style="flex:1">
            <label>URL</label>
            <input type="url" id="inUrl" placeholder="https://..." oninput="onUrl(this.value)">
          </div>
          <div class="fg" style="width:120px">
            <label>Label</label>
            <input type="text" id="inLabel" placeholder="Auto">
          </div>
          <button class="btn btn-ac" onclick="addLink()">Add</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modal" class="overlay hidden" onclick="if(event.target===this)hideModal()">
    <div class="modal">
      <h3>New Task</h3>
      <input type="text" id="inKey" placeholder="TASK_KEY" onkeydown="if(event.key==='Enter')mkTask()">
      <div class="modal-ft">
        <button class="btn" onclick="hideModal()">Cancel</button>
        <button class="btn btn-ac" onclick="mkTask()">Create</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/tasks';
    let tasks = [], selKey = null, selTask = null;

    const COLORS = {
      jira:'#4a9af5', wiki:'#22c55e', pr:'#f59e0b', figma:'#a855f7',
      github:'#e4e4e7', slack:'#e91e63', notion:'#a1a1aa', link:'#8b5cf6'
    };

    function autoLabel(u) {
      if (u.includes('jira.')) return 'Jira';
      if (u.includes('wiki.') || u.includes('confluence')) return 'Wiki';
      if (/\/pull\/\d+/.test(u)) return 'PR';
      if (u.includes('figma.com')) return 'Figma';
      if (u.includes('github.com') || u.includes('oss.')) return 'GitHub';
      if (u.includes('slack.com')) return 'Slack';
      if (u.includes('notion.')) return 'Notion';
      return 'Link';
    }

    function dotColor(label) {
      return COLORS[label.toLowerCase()] || COLORS.link;
    }

    function onUrl(v) {
      const el = $('inLabel');
      if (!el.dataset.manual) el.value = v ? autoLabel(v) : '';
    }

    function $(id) { return document.getElementById(id); }

    async function load() {
      tasks = await (await fetch(API)).json();
      renderList();
    }

    async function select(key) {
      selKey = key;
      selTask = await (await fetch(`${API}/${key}`)).json();
      renderList();
      renderDetail();
    }

    async function mkTask() {
      const raw = $('inKey').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g, '_');
      if (!raw) return;
      await fetch(`${API}/${raw}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({links:[]})
      });
      hideModal();
      await load();
      select(raw);
    }

    async function delTask() {
      if (!selKey || !confirm(`"${selKey}" 삭제?`)) return;
      await fetch(`${API}/${selKey}`, {method:'DELETE'});
      selKey = null; selTask = null;
      await load();
      renderDetail();
    }

    async function addLink() {
      const url = $('inUrl').value.trim();
      const label = $('inLabel').value.trim() || autoLabel(url);
      if (!url || !selTask || !/^https?:\/\//i.test(url)) return;
      selTask.links.push({label, url});
      await save();
      $('inUrl').value = '';
      $('inLabel').value = '';
      $('inLabel').dataset.manual = '';
      renderDetail();
      $('inUrl').focus();
    }

    async function rmLink(i) {
      selTask.links.splice(i, 1);
      await save();
      renderDetail();
    }

    async function save() {
      await fetch(`${API}/${selKey}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({links: selTask.links})
      });
      await load();
    }

    function renderList() {
      const el = $('taskList');
      if (!tasks.length) {
        el.innerHTML = '<div class="empty" style="padding:40px 0"><p>No tasks yet</p></div>';
        return;
      }
      el.innerHTML = tasks.map(t => `
        <div class="task-item${t.key===selKey?' active':''}" onclick="select('${t.key}')">
          <span class="task-name">${t.key}</span>
          <span class="badge">${t.linkCount}</span>
        </div>`).join('');
    }

    function renderDetail() {
      const e = $('emptyMain'), d = $('detail');
      if (!selTask) { e.classList.remove('hidden'); d.classList.add('hidden'); return; }
      e.classList.add('hidden'); d.classList.remove('hidden');
      $('taskTitle').textContent = selTask.key;
      const w = $('linksWrap');
      if (!selTask.links.length) {
        w.innerHTML = '<div class="empty"><p>No links yet &mdash; add one below</p></div>';
        return;
      }
      w.innerHTML = selTask.links.map((l, i) => `
        <div class="link-card">
          <div class="link-dot" style="background:${dotColor(l.label)}"></div>
          <div class="link-body">
            <div class="link-label" style="color:${dotColor(l.label)}">${esc(l.label)}</div>
            <div class="link-url"><a href="${safeHref(l.url)}" target="_blank" rel="noopener">${esc(l.url)}</a></div>
          </div>
          <button class="btn-x" onclick="rmLink(${i})">&#x2715;</button>
        </div>`).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function safeHref(url) {
      return /^https?:\/\//i.test(url) ? esc(url) : '#';
    }

    function showModal() {
      $('modal').classList.remove('hidden');
      $('inKey').value = '';
      $('inKey').focus();
    }

    function hideModal() { $('modal').classList.add('hidden'); }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hideModal();
    });

    $('inLabel').addEventListener('input', function() {
      this.dataset.manual = this.value ? '1' : '';
    });

    $('inUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });
    $('inLabel').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });

    load();
  </script>
</body>
</html>
