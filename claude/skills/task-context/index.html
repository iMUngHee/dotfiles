<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Context</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --sf1: #18181b;
      --sf2: #27272a;
      --sf3: #3f3f46;
      --bd: #27272a;
      --bd2: #3f3f46;
      --tx: #fafafa;
      --tx2: #a1a1aa;
      --tx3: #71717a;
      --ac: #8b5cf6;
      --ac2: #a78bfa;
      --ac-bg: rgba(139,92,246,.12);
      --dn: #ef4444;
      --dn2: #f87171;
      --dn-bg: rgba(239,68,68,.1);
      --wn: #f59e0b;
      --r: 10px;
      --rs: 6px;
      --tr: 150ms ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--tx);
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sf3); border-radius: 3px; }

    .app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sf1);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
    }

    .sidebar-hd {
      padding: 24px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-hd h1 {
      font-size: 11px;
      font-weight: 700;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .task-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }

    .task-item {
      padding: 10px 14px;
      border-radius: var(--rs);
      cursor: pointer;
      transition: all var(--tr);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
      border: 1px solid transparent;
      gap: 8px;
    }

    .task-item:hover { background: var(--sf2); }

    .task-item.active {
      background: var(--ac-bg);
      border-color: rgba(139,92,246,.2);
    }

    .task-item.active .task-name { color: var(--ac2); }

    .task-name {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .star {
      color: var(--wn);
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
    }

    .badge {
      font-size: 11px;
      color: var(--tx3);
      background: var(--sf2);
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .task-item.active .badge {
      background: rgba(139,92,246,.18);
      color: var(--ac2);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-hd {
      padding: 24px 36px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--bd);
      gap: 12px;
    }

    .main-hd-l { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .main-hd-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .main-hd h2 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .links-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 20px 36px;
    }

    /* ── Link cards ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card {
      background: var(--sf1);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color var(--tr);
      animation: cardIn 180ms ease;
    }

    .link-card:hover { border-color: var(--bd2); }

    .link-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 7px;
    }

    .link-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .link-label-input {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: transparent;
      border: none;
      color: var(--ac2);
      padding: 1px 0;
      outline: none;
      width: 100%;
    }

    .link-label-input:focus { color: var(--tx); }

    .field-row {
      display: grid;
      grid-template-columns: 70px 1fr;
      align-items: start;
      gap: 10px;
      font-size: 13px;
    }

    .field-key {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--tx3);
      padding-top: 6px;
    }

    .field-input {
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--rs);
      color: var(--tx2);
      font-size: 13px;
      padding: 4px 8px;
      width: 100%;
      outline: none;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color var(--tr), background var(--tr);
    }

    .field-input:hover { background: var(--sf2); }
    .field-input:focus {
      background: var(--bg);
      border-color: var(--ac);
      color: var(--tx);
    }

    .field-input.url { font-size: 12px; color: var(--tx3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .field-input.url:focus { white-space: normal; overflow: auto; text-overflow: clip; }
    textarea.field-input { min-height: 28px; }

    .btn-x {
      padding: 4px 7px;
      border: none;
      background: transparent;
      color: var(--tx3);
      cursor: pointer;
      border-radius: var(--rs);
      transition: all var(--tr);
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .btn-x:hover { background: var(--dn-bg); color: var(--dn); }

    /* ── Add link bar ── */
    .add-bar {
      padding: 14px 36px 18px;
      border-top: 1px solid var(--bd);
      display: grid;
      grid-template-columns: 1fr 130px auto;
      gap: 8px;
      align-items: end;
    }

    .add-bar .row2 {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .fg { display: flex; flex-direction: column; gap: 4px; }

    .fg label {
      font-size: 10px;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
    }

    input[type="text"], input[type="url"], textarea {
      padding: 8px 11px;
      border-radius: var(--rs);
      border: 1px solid var(--bd);
      background: var(--bg);
      color: var(--tx);
      font-size: 13px;
      outline: none;
      transition: border-color var(--tr);
      font-family: inherit;
    }

    .add-bar input:focus, .add-bar textarea:focus { border-color: var(--ac); }
    input::placeholder, textarea::placeholder { color: var(--tx3); }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border-radius: var(--rs);
      border: 1px solid var(--bd2);
      background: var(--sf2);
      color: var(--tx);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--tr);
      white-space: nowrap;
    }

    .btn:hover { background: var(--sf3); }

    .btn-ac {
      background: var(--ac);
      border-color: var(--ac);
      color: #fff;
    }

    .btn-ac:hover { background: var(--ac2); border-color: var(--ac2); }

    .btn-sm { padding: 7px 14px; font-size: 12px; }

    .btn-dn {
      color: var(--dn);
      border-color: transparent;
      background: transparent;
    }

    .btn-dn:hover { background: var(--dn-bg); }

    .btn-star {
      background: transparent;
      border-color: var(--bd2);
      color: var(--tx2);
    }

    .btn-star.on {
      color: var(--wn);
      border-color: var(--wn);
      background: rgba(245,158,11,.08);
    }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--tx3);
      gap: 6px;
    }

    .empty-icon { font-size: 32px; opacity: .4; margin-bottom: 4px; }
    .empty p { font-size: 13px; }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--sf1);
      border: 1px solid var(--bd2);
      border-radius: var(--r);
      padding: 28px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .modal input {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 18px;
      border-radius: var(--rs);
      border: 1px solid var(--bd2);
      background: var(--bg);
      color: var(--tx);
      font-size: 14px;
      outline: none;
    }

    .modal input:focus { border-color: var(--ac); }

    .modal-ft {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      border-radius: var(--rs);
      background: var(--sf2);
      border: 1px solid var(--bd2);
      color: var(--tx);
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      z-index: 200;
      animation: cardIn 180ms ease;
      max-width: 380px;
    }

    .toast.err {
      border-color: var(--dn);
      background: var(--dn-bg);
      color: var(--dn2);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-hd">
        <h1>Tasks</h1>
        <button class="btn btn-ac btn-sm" onclick="showModal()">+ New</button>
      </div>
      <div class="task-list" id="taskList"></div>
    </aside>
    <main class="main">
      <div id="emptyMain" class="empty">
        <div class="empty-icon">&mdash;</div>
        <p>Select a task or create a new one</p>
      </div>
      <div id="detail" class="hidden" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
        <div class="main-hd">
          <div class="main-hd-l">
            <h2 id="taskTitle"></h2>
          </div>
          <div class="main-hd-r">
            <button class="btn btn-star btn-sm" id="btnStar" onclick="toggleCurrent()" title="Set as current task">★ Set Current</button>
            <button class="btn btn-dn btn-sm" onclick="delTask()">Delete</button>
          </div>
        </div>
        <div class="links-wrap" id="linksWrap"></div>
        <div class="add-bar">
          <div class="fg">
            <label>URL</label>
            <input type="url" id="inUrl" placeholder="https://..." oninput="onUrl(this.value)">
          </div>
          <div class="fg">
            <label>Label</label>
            <input type="text" id="inLabel" placeholder="Auto">
          </div>
          <button class="btn btn-ac" onclick="addLink()">Add</button>
          <div class="row2">
            <div class="fg">
              <label>Triggers (optional)</label>
              <input type="text" id="inTriggers" placeholder="키워드, 콤마, 분리">
            </div>
            <div class="fg">
              <label>Summary (optional)</label>
              <input type="text" id="inSummary" placeholder="한 줄 설명 (비워두면 나중에 페치)">
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal" class="overlay hidden" onclick="if(event.target===this)hideModal()">
    <div class="modal">
      <h3>New Task</h3>
      <input type="text" id="inKey" placeholder="TASK_KEY" onkeydown="if(event.key==='Enter')mkTask()">
      <div class="modal-ft">
        <button class="btn" onclick="hideModal()">Cancel</button>
        <button class="btn btn-ac" onclick="mkTask()">Create</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    const API = '/api/tasks';
    let tasks = [], selKey = null, selTask = null, current = null;

    const COLORS = {
      jira:'#4a9af5', wiki:'#22c55e', pr:'#f59e0b', figma:'#a855f7',
      github:'#e4e4e7', slack:'#e91e63', notion:'#a1a1aa', link:'#8b5cf6'
    };

    function autoLabel(u) {
      if (u.includes('jira.')) return 'Jira';
      if (u.includes('wiki.') || u.includes('confluence')) return 'Wiki';
      if (/\/pull\/\d+/.test(u)) return 'PR';
      if (u.includes('figma.com')) return 'Figma';
      if (u.includes('github.com') || u.includes('oss.')) return 'GitHub';
      if (u.includes('slack.com')) return 'Slack';
      if (u.includes('notion.')) return 'Notion';
      return 'Link';
    }

    function uniqueLabel(base, taken) {
      const lower = new Set(taken.map(s => s.toLowerCase()));
      if (!lower.has(base.toLowerCase())) return base;
      for (let n = 2; n < 100; n++) {
        const cand = `${base}-${n}`;
        if (!lower.has(cand.toLowerCase())) return cand;
      }
      return `${base}-${Date.now()}`;
    }

    function dotColor(label) {
      const key = label.toLowerCase().split(/[-\s]/)[0];
      return COLORS[key] || COLORS.link;
    }

    function onUrl(v) {
      const el = $('inLabel');
      if (!el.dataset.manual) {
        const taken = (selTask?.links ?? []).map(l => l.label);
        el.value = v ? uniqueLabel(autoLabel(v), taken) : '';
      }
    }

    function $(id) { return document.getElementById(id); }

    function toast(msg, type) {
      const t = $('toast');
      t.textContent = msg;
      t.className = 'toast' + (type === 'err' ? ' err' : '');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.add('hidden'), 3500);
    }

    async function loadCurrent() {
      try {
        const r = await fetch('/api/current');
        const d = await r.json();
        current = d.current;
      } catch { current = null; }
    }

    async function load() {
      await loadCurrent();
      tasks = await (await fetch(API)).json();
      renderList();
      renderStarBtn();
    }

    async function select(key) {
      selKey = key;
      selTask = await (await fetch(`${API}/${key}`)).json();
      renderList();
      renderDetail();
      renderStarBtn();
    }

    async function mkTask() {
      const raw = $('inKey').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g, '_');
      if (!raw) return;
      const r = await fetch(`${API}/${raw}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({links:[]})
      });
      if (!r.ok) { toast(`생성 실패: HTTP ${r.status}`, 'err'); return; }
      hideModal();
      await load();
      select(raw);
    }

    async function delTask() {
      if (!selKey || !confirm(`"${selKey}" 삭제?`)) return;
      await fetch(`${API}/${selKey}`, {method:'DELETE'});
      selKey = null; selTask = null;
      await load();
      renderDetail();
    }

    async function toggleCurrent() {
      if (!selKey) return;
      const next = current === selKey ? null : selKey;
      const r = await fetch('/api/current', {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({current: next})
      });
      if (!r.ok) { toast(`current 변경 실패: HTTP ${r.status}`, 'err'); return; }
      const d = await r.json();
      current = d.current;
      renderList();
      renderStarBtn();
      toast(current ? `Current: ${current}` : 'Current cleared');
    }

    async function addLink() {
      const url = $('inUrl').value.trim();
      const label = $('inLabel').value.trim() || autoLabel(url);
      const triggers = $('inTriggers').value.split(',').map(s => s.trim()).filter(Boolean);
      const summary = $('inSummary').value.trim();
      if (!url || !selTask || !/^https?:\/\//i.test(url)) {
        toast('유효한 URL을 입력하세요', 'err'); return;
      }
      if (selTask.links.some(l => l.url === url)) {
        toast('이미 등록된 URL입니다', 'err'); return;
      }
      if (selTask.links.some(l => l.label.toLowerCase() === label.toLowerCase())) {
        toast(`라벨 중복: ${label}`, 'err'); return;
      }
      selTask.links.push({label, url, triggers, summary});
      const ok = await save();
      if (!ok) { selTask.links.pop(); return; }
      $('inUrl').value = '';
      $('inLabel').value = '';
      $('inLabel').dataset.manual = '';
      $('inTriggers').value = '';
      $('inSummary').value = '';
      renderDetail();
      $('inUrl').focus();
    }

    async function rmLink(i) {
      const removed = selTask.links.splice(i, 1)[0];
      const ok = await save();
      if (!ok) selTask.links.splice(i, 0, removed);
      renderDetail();
    }

    async function updateField(i, key, value) {
      const link = selTask.links[i];
      const prev = link[key];
      const next = key === 'triggers'
        ? value.split(',').map(s => s.trim()).filter(Boolean)
        : value.trim();
      if (JSON.stringify(prev) === JSON.stringify(next)) return;
      link[key] = next;
      const ok = await save();
      if (!ok) {
        link[key] = prev;
        renderDetail();
      }
    }

    async function save() {
      const r = await fetch(`${API}/${selKey}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({links: selTask.links})
      });
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        try { msg = (await r.json()).error || msg; } catch {}
        toast(msg, 'err');
        return false;
      }
      const d = await r.json();
      selTask.links = d.links;
      await loadServerList();
      return true;
    }

    async function loadServerList() {
      tasks = await (await fetch(API)).json();
      renderList();
    }

    function renderList() {
      const el = $('taskList');
      if (!tasks.length) {
        el.innerHTML = '<div class="empty" style="padding:40px 0"><p>No tasks yet</p></div>';
        return;
      }
      el.innerHTML = tasks.map(t => `
        <div class="task-item${t.key===selKey?' active':''}" onclick="select('${esc(t.key)}')">
          <span class="task-name">${esc(t.key)}</span>
          ${current === t.key ? '<span class="star">★</span>' : ''}
          <span class="badge">${t.linkCount}</span>
        </div>`).join('');
    }

    function renderStarBtn() {
      const b = $('btnStar');
      if (!b || !selKey) return;
      const on = current === selKey;
      b.classList.toggle('on', on);
      b.textContent = on ? '★ Current' : '★ Set Current';
    }

    function renderDetail() {
      const e = $('emptyMain'), d = $('detail');
      if (!selTask) { e.classList.remove('hidden'); d.classList.add('hidden'); return; }
      e.classList.add('hidden'); d.classList.remove('hidden');
      $('taskTitle').textContent = selTask.key;
      const w = $('linksWrap');
      if (!selTask.links.length) {
        w.innerHTML = '<div class="empty"><p>No links yet &mdash; add one below</p></div>';
        return;
      }
      w.innerHTML = selTask.links.map((l, i) => `
        <div class="link-card">
          <div class="link-dot" style="background:${dotColor(l.label)}"></div>
          <div class="link-body">
            <input class="link-label-input" style="color:${dotColor(l.label)}"
              value="${esc(l.label)}" data-i="${i}" data-k="label"
              onblur="updateField(${i},'label',this.value)">
            <div class="field-row">
              <span class="field-key">URL</span>
              <input class="field-input url" value="${esc(l.url)}"
                onblur="updateField(${i},'url',this.value)">
            </div>
            <div class="field-row">
              <span class="field-key">Triggers</span>
              <input class="field-input" value="${esc((l.triggers||[]).join(', '))}"
                placeholder="키워드, 콤마, 분리"
                onblur="updateField(${i},'triggers',this.value)">
            </div>
            <div class="field-row">
              <span class="field-key">Summary</span>
              <textarea class="field-input" rows="2"
                placeholder="한 줄 설명"
                onblur="updateField(${i},'summary',this.value)">${esc(l.summary || '')}</textarea>
            </div>
          </div>
          <button class="btn-x" onclick="rmLink(${i})">&#x2715;</button>
        </div>`).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function showModal() {
      $('modal').classList.remove('hidden');
      $('inKey').value = '';
      $('inKey').focus();
    }

    function hideModal() { $('modal').classList.add('hidden'); }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hideModal();
    });

    $('inLabel').addEventListener('input', function() {
      this.dataset.manual = this.value ? '1' : '';
    });

    $('inUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });
    $('inLabel').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });
    $('inTriggers').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });
    $('inSummary').addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });

    load();
  </script>
</body>
</html>
